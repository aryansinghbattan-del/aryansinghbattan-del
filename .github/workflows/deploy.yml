name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd /home/ubuntu/aryansinghbattan-del
            git pull origin main

            sudo docker stop myportfolio || true
            sudo docker rm myportfolio || true

            sudo docker build -t aryanportfolio .

            sudo docker run -d --name myportfolio -p 8080:80 aryanportfolio